# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master, s7-rewrite]
  pull_request:
    branches: [main, master]

name: R-CMD-check

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      # osqp-r uses git submodules for C sources. pak downloads GitHub
      # tarballs which exclude submodules, breaking the build. Clone
      # with --recursive and point pak at the local directory instead.
      - name: Clone osqp-r with submodules
        run: |
          TMPDIR="${RUNNER_TEMP//\\//}"
          git clone --recursive https://github.com/osqp/osqp-r.git "$TMPDIR/osqp-r"
          echo "OSQP_R_DIR=$TMPDIR/osqp-r" >> "$GITHUB_ENV"
        shell: bash

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: >-
            any::rcmdcheck,
            oxfordcontrol/clarabel-r,
            local::${{ env.OSQP_R_DIR }},
            any::Rglpk,
            any::ECOSolveR,
            any::cccp,
            any::piqp
          needs: check
          dependencies: 'c("Depends", "Imports", "LinkingTo", "Suggests")'

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          args: '"--no-manual"'
