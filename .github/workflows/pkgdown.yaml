# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master, s7-rewrite]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # osqp-r uses git submodules for C sources. pak downloads GitHub
      # tarballs which exclude submodules, breaking the build. Clone
      # with --recursive and point pak at the local directory instead.
      - name: Clone osqp-r with submodules
        run: |
          TMPDIR="${RUNNER_TEMP//\\//}"
          git clone --recursive https://github.com/osqp/osqp-r.git "$TMPDIR/osqp-r"
          echo "OSQP_R_DIR=$TMPDIR/osqp-r" >> "$GITHUB_ENV"
        shell: bash

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: >-
            any::pkgdown,
            local::.,
            oxfordcontrol/clarabel-r,
            local::${{ env.OSQP_R_DIR }}
          needs: website
          dependencies: 'c("Depends", "Imports", "LinkingTo", "Suggests")'

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
