# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
#
# osqp and clarabel resolved via R-universe repos (pre-built binaries).
on:
  push:
    branches: [main, master, s7-rewrite]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Add R-universe repos
        run: |
          cat('local({',
              '  r <- getOption("repos")',
              '  r["osqp"] <- "https://osqp.r-universe.dev"',
              '  r["clarabel"] <- "https://oxfordcontrol.r-universe.dev"',
              '  options(repos = r)',
              '})',
              sep = "\n",
              file = "~/.Rprofile",
              append = TRUE)
        shell: Rscript {0}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website
          dependencies: 'c("Depends", "Imports", "LinkingTo", "Suggests")'

      - name: Build site
        run: pkgdown::build_site(override = list(destination = "docs"), new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Commit docs to current branch
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "Rebuild pkgdown site"
          git push
