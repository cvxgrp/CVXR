# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
#
# osqp (>= 1.0.0) and clarabel (>= 0.11.2) are not yet on CRAN.
# Pre-built binaries are available from R-universe.
#
# Enhances packages NOT tested in CI:
#   Rmosek  -- CRAN version is outdated/non-functional
#   gurobi  -- commercial, not on CRAN
#   Rcplex  -- CRAN version is outdated/non-functional
# These are skipped via require_solver() guards in tests.
on:
  push:
    branches: [main, master, s7-rewrite]
  pull_request:
    branches: [main, master]

name: R-CMD-check

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      # Add R-universe repos for osqp and clarabel (not yet on CRAN).
      # RENV_CONFIG_REPOS_OVERRIDE from setup-r overrides Additional_repositories
      # in DESCRIPTION, so we must add them to .Rprofile explicitly.
      - name: Add R-universe repos
        run: |
          cat('local({',
              '  r <- getOption("repos")',
              '  r["osqp"] <- "https://osqp.r-universe.dev"',
              '  r["clarabel"] <- "https://oxfordcontrol.r-universe.dev"',
              '  options(repos = r)',
              '})',
              sep = "\n",
              file = "~/.Rprofile",
              append = TRUE)
        shell: Rscript {0}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: >-
            any::rcmdcheck,
            any::Rglpk,
            any::ECOSolveR,
            any::cccp,
            any::piqp
          needs: check
          dependencies: 'c("Depends", "Imports", "LinkingTo", "Suggests")'

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          args: '"--no-manual"'
